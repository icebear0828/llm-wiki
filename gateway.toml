port = 8080
master_key = "<REDACTED-MASTER-KEY>"
request_timeout = 600

rag_enabled = true
rag_top_k = 3
rag_min_query_length = 5

# Single OpenAI-compatible backend (proxypool VPS gateway).
# All 3 model families registered here — LiteLLM converts incoming
# Anthropic /v1/messages and Gemini :generateContent to OpenAI on the wire.
[backends.openai]
api_base = "https://your-gateway.example.com/v1/v1"
api_key = "<REDACTED-GATEWAY-KEY>"
models = ["gpt-5.4-mini", "claude-3-5-haiku-20241022", "gemini-2.5-flash"]

[backends.anthropic]
api_base = ""
api_key = "dummy"
models = []

[backends.gemini]
api_base = ""
api_key = "dummy"
models = []
